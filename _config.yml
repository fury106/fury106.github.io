lang: nl
remote_theme: chrisrhymes/bulma-clean-theme
title: Fury_106
#google_analytics: UA-191715723-1
footer_menu: footer
favicon: img/favicon.png
url: "https://fury106.github.io"
timezone: Europe/Brussels
markdown: kramdown
highlighter: rouge

paginate: 5
paginate_path: "/blog/page:num"
future: true

plugins:
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-feed
  - jekyll-seo-tag
  - kramdown-parser-gfm

exclude: 
  - Gemfile
  - clean-theme.gemspec
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

livereload: true

sass:
  style: compressed
  source_dir: _sass

defaults:
  -
    scope:
      type: posts
      path: _posts
    values:
      is_post: true
      layout: post
      permalink: /blog/:title/
      author: "Fury_106"
      show_sidebar: true
  - 
    scope:
  
      path: ""
      type: "pages"
    values:
      show_sidebar: true
